<div class="chat-app">
  <div class="chat-shell">
    <app-chat-sidebar
      [sessions]="sessions()"
      [activeSessionId]="activeSessionId()"
      (sessionSelected)="setActiveSession($event)"
      (createSession)="createNewSession()"
    />

    <div class="main-panel">
      <app-chat-header
        [title]="activeSession().title"
        (deleteChat)="clearCurrentSession()"
      />

      <app-chat-messages
        [messages]="messages()"
        [isLoading]="isLoading()"
      />

      <app-chat-composer
        [messageControl]="messageControl"
        [isLoading]="isLoading()"
        [sessionId]="activeSessionId()"
        (sendMessage)="sendMessage()"
      />
    </div>
  </div>
</div>
