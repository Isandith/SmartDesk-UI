<div class="chat-app">
  <div class="chat-shell">
    <app-chat-sidebar
      [class.mobile-open]="isSidebarOpen()"
      [sessions]="sessions()"
      [activeSessionId]="activeSessionId()"
      (sessionSelected)="setActiveSession($event)"
      (createSession)="createNewSession()"
      (deleteSession)="deleteSession($event)"
      (closeRequested)="closeSidebar()"
    />

    <div class="main-panel">
      <app-chat-header
        [title]="activeSession().title"
        (menuRequested)="toggleSidebar()"
        (resetSessionRequested)="resetCurrentSession()"
      />

      <app-chat-messages
        [messages]="messages()"
        [isLoading]="isLoading()"
      />

      <app-chat-composer
        [messageControl]="messageControl"
        [isLoading]="isLoading()"
        [sessionId]="activeSessionId()"
        (sendMessage)="sendMessage()"
      />
    </div>

    <button
      type="button"
      class="mobile-sidebar-backdrop"
      [class.is-visible]="isSidebarOpen()"
      aria-label="Close chat list"
      (click)="closeSidebar()"
    ></button>
  </div>

  @if (warningToast()) {
    <div class="toast-stack" role="status" aria-live="polite">
      <div class="warning-toast">
        <span>{{ warningToast() }}</span>
        <button type="button" class="toast-dismiss" (click)="dismissWarningToast()" aria-label="Dismiss warning">
          ×
        </button>
      </div>
    </div>
  }
</div>
